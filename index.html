<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colin Jennings — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;color:#e5e7eb;background:#020617;line-height:1.6}

/* ===== TOGGLE THIS (true/false) ===== */
#banner{display:none}
.banner-on #banner{display:block}

#banner{
  width:100%;
  text-align:center;
  padding:0.6rem;
  font-weight:600;
  background: repeating-linear-gradient(
    45deg,
    #facc15,
    #facc15 10px,
    #111827 10px,
    #111827 20px
  );
  color:black;
}

nav{display:flex;justify-content:space-between;padding:1.5rem 2rem}
.logo{font-weight:700;color:#fff}
ul{display:flex;gap:1.5rem;list-style:none}
a{color:#94a3b8;text-decoration:none}a:hover{color:#2563eb}

#hero{text-align:center;padding:5rem 1rem}
#hero h1{font-size:3rem;background:linear-gradient(to right,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#hero p{color:#94a3b8}

.container{max-width:1100px;margin:auto;padding:2rem 1rem}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2rem}

.card{background:#111827;border-radius:16px;overflow:hidden;border:1px solid #1f2937;transition:.3s}
.card:hover{transform:translateY(-6px);border-color:#3b82f6}

.preview img{width:100%;height:250px;object-fit:cover}

.content{padding:1.5rem}
.title{font-weight:600;font-size:1.2rem}
.desc{color:#94a3b8;font-size:.9rem;margin:.5rem 0}
.button{background:#2563eb;padding:.5rem 1rem;border-radius:8px;display:inline-block;cursor:pointer}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:none;justify-content:center;align-items:center}
.modal-content{background:#020617;border-radius:16px;max-width:900px;width:95%;max-height:85vh;overflow:auto}

.image-gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;padding:2rem}
.image-gallery img{width:100%;height:200px;object-fit:cover;border-radius:10px;cursor:pointer}

.img-viewer{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;justify-content:center;align-items:center}
.img-viewer img{max-width:90%;max-height:90%}

footer{text-align:center;padding:3rem;color:#64748b}
</style>
</head>

<body class="banner-on"><!-- REMOVE 'banner-on' TO TURN OFF -->

<div id="banner">⚠️ Site under construction — some content may be incomplete</div>

<nav>
<div class="logo">Colin Jennings</div>
<ul>
<li><a href="#projects">Projects</a></li>
<li><a href="#" onclick="openContact()">Contact</a></li>
</ul>
</nav>

<section id="hero">
<h1>Mechanical Engineering & Robotics</h1>
<p>Mechanical Engineering Student at UC Riverside</p>
</section>

<div class="container">
<div id="projects" class="grid"></div>
</div>

<!-- MODALS -->
<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-content" onclick="event.stopPropagation()">
<span onclick="closeModal()" style="float:right;padding:1rem;cursor:pointer">✕</span>
<div id="modal-body"></div>
</div>
</div>

<div id="imgViewer" class="img-viewer" onclick="closeImage()">
<img id="imgViewerSrc">
</div>

<!-- CONTACT MODAL -->
<div id="contactModal" class="modal" onclick="closeContact()">
<div class="modal-content" onclick="event.stopPropagation()" style="padding:2rem">
<span onclick="closeContact()" style="float:right;cursor:pointer">✕</span>
<h2>Contact</h2>
<p>Email: your-email@example.com</p>
<p>GitHub: (add link)</p>
<p>LinkedIn: (add link)</p>
</div>
</div>

<footer>© 2026 Colin Jennings</footer>

<script>
const projects = [
{
  title:"Dreammakers Article",
  description:"Featured in Tri-Valley innovation article",
  thumbnail:"assets/article.jpg",
  external:"https://www.pleasantonweekly.com/news/2024/12/11/the-future-of-innovation-bold-students-honored-as-tri-valleys-2024-dreammakers-and-risktakers/"
},
{
  title:"Highlander Racing - FSAE",
  description:"Drivetrain Engineering Associate",
  thumbnail:"assets/highlander racing.jpg",
  slides:"assets/Drivetrain Intern Project.pdf",
  images:["assets/robot-cad.jpg","assets/FSAE ScatterShield Drawing.png"],
  details:"Differential + scatter shield design using FEA.",
  // TODO: add
  // - machining photos
  // - CAD screenshots
  // - assembly pics
},
{
  title:"Pleasanton Pixels",
  description:"Holiday light shows",
  video:"https://www.youtube.com/embed/tC4W2WbGR0o",
  thumbnail:"assets/Pleasanton Pixels 1.JPG",
  images:["assets/Controller Box.JPG"],
  details:"ESP32 + power distribution system",
  // TODO:
  // - power supply photos
  // - soldering/build pics
  // - control system diagrams
},
{
  title:"Combat Robotics",
  description:"60lb robot",
  video:"https://www.youtube.com/embed/-laG-haSI4I",
  thumbnail:"assets/IMG_6491.jpeg",
  images:["assets/IMG_3930.jpeg"],
  details:"250mph weapon system",
  // TODO:
  // - event photos
  // - CAD breakdown
  // - suppliers/components list
},
{
  title:"Ride Shield",
  description:"BLE bike lock",
  video:"https://www.youtube.com/embed/GA05c-eLNOg",
  thumbnail:"assets/IMG_5276.jpeg",
  images:["assets/IMG_5276.jpeg"],
  details:"Capstone project presented to local tech groups"
}
];

const container=document.getElementById('projects');

projects.forEach((p,i)=>{
  const card=document.createElement('div');
  card.className='card';

  const clickAction = p.external
    ? `window.open('${p.external}','_blank')`
    : `openModal(${i})`;

  card.innerHTML=`
    <div class="preview"><img src="${p.thumbnail}"></div>
    <div class="content">
      <div class="title">${p.title}</div>
      <div class="desc">${p.description}</div>
      <div class="button" onclick="${clickAction}">${p.external ? 'Open Article →' : 'About →'}</div>
    </div>`;

  container.appendChild(card);
});

function openModal(i){
  const p=projects[i];
  const modal=document.getElementById('modal');
  const body=document.getElementById('modal-body');

  body.innerHTML=`
    <div style="padding:2rem">
      <h2>${p.title}</h2>
      <p>${p.details||''}</p>
      ${p.slides?`<iframe src="${p.slides}" style="width:100%;height:400px"></iframe>`:''}
      ${p.video?`<iframe src="${p.video}" style="width:100%;height:400px"></iframe>`:''}
    </div>
    <div class="image-gallery">
      ${(p.images||[]).map(img=>`<img src="${img}" onclick="openImage('${img}')">`).join('')}
    </div>`;

  modal.style.display='flex';
}

function closeModal(){document.getElementById('modal').style.display='none'}
function openImage(src){document.getElementById('imgViewerSrc').src=src;document.getElementById('imgViewer').style.display='flex'}
function closeImage(){document.getElementById('imgViewer').style.display='none'}

function openContact(){document.getElementById('contactModal').style.display='flex'}
function closeContact(){document.getElementById('contactModal').style.display='none'}
</script>

</body>
</html>
