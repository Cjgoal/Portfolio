<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colin Jennings — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  color:#e5e7eb;
  background:#020617;
}

nav{display:flex;justify-content:space-between;padding:1.5rem 2rem}
.logo{font-weight:700}
ul{display:flex;gap:1.5rem;list-style:none}
a{color:#94a3b8;text-decoration:none}
a:hover{color:white}

#hero{text-align:center;padding:4rem 1rem}
#hero h1{font-size:2.5rem}
#hero p{color:#94a3b8}

.container{max-width:1100px;margin:auto;padding:2rem 1rem}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}

.card{
  background:#111827;
  border-radius:16px;
  overflow:hidden;
  transition:.3s;
}
.card:hover{transform:translateY(-5px)}

.preview{display:grid;grid-template-columns:2fr 1fr;gap:4px}
.preview img, .preview iframe{width:100%;height:200px;object-fit:cover}
.preview iframe{height:100%}

.content{padding:1rem}
.title{font-weight:600;font-size:1.2rem}
.desc{color:#94a3b8;font-size:.9rem;margin:.3rem 0}

.button{
  margin-top:.5rem;
  display:inline-block;
  padding:.4rem .8rem;
  border-radius:8px;
  background:#2563eb;
  font-size:.8rem;
}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  display:none;justify-content:center;align-items:center;
}
.modal-content{
  background:#020617;
  padding:2rem;
  border-radius:16px;
  max-width:800px;width:100%;
}
.close{cursor:pointer;float:right}

footer{text-align:center;padding:2rem;color:#64748b}
</style>
</head>

<body>

<nav>
<div class="logo">Colin Jennings</div>
<ul>
<li><a href="#">Projects</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<section id="hero">
<h1>Mechanical Engineering & Robotics</h1>
<p>Mechanical Engineering Student at UC Riverside</p>
</section>

<div class="container">
<div id="projects" class="grid"></div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-content" onclick="event.stopPropagation()">
<span class="close" onclick="closeModal()">✕</span>
<div id="modal-body"></div>
</div>
</div>

<footer>© 2026 Colin Jennings</footer>

<script>
// === PROJECT DATA FILE SYSTEM (EDIT THIS ONLY) ===
const projects = [
{
  title: "Combat Robotics",
  description: "60lb combat robot build and competition",
  video: "https://www.youtube.com/embed/-laG-haSI4I",
  images: [
    "assets/RoboGames 2024.jpg",
    "assets/robot-cad.jpg",
    "assets/robot-internals.jpg"
  ],
  details: "Designed and built competition combat robots focusing on durability and high-energy systems."
},
{
  title: "Pleasanton Pixels",
  description: "Holiday Light Display - Checkout more at youtube.com/@pleasantonpixels",
  video: "https://www.youtube.com/embed/-tC4W2WbGR0o",
  images: [
    "assets/Pleasanton Pixels 1.JPG",
    "assets/Pleasanton Pixels 3.JPG"
  ],
  details: "Synchronized large-scale LED displays using ESP32 and xLights."
}
];

// === AUTO RENDER ===
const container = document.getElementById('projects');

projects.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';

  const previewMedia = p.video
    ? `<iframe src="${p.video}" allowfullscreen></iframe>`
    : `<img src="${p.images[0]}">`;

  const sideImage = p.images[0]
    ? `<img src="${p.images[0]}">`
    : '';

  card.innerHTML = `
    <div class="preview">
      ${previewMedia}
      ${sideImage}
    </div>
    <div class="content">
      <div class="title">${p.title}</div>
      <div class="desc">${p.description}</div>
      <div class="button" onclick="openModal(${i})">View Project →</div>
    </div>
  `;

  container.appendChild(card);
});

function openModal(i){
  const p = projects[i];
  const modal = document.getElementById('modal');
  const body = document.getElementById('modal-body');

  body.innerHTML = `
    <h2>${p.title}</h2>
    <p>${p.details}</p>
    ${p.video ? `<iframe src="${p.video}" allowfullscreen></iframe>` : ''}
    ${p.images.map(img => `<img src="${img}" style="width:100%;margin-top:10px;border-radius:10px">`).join('')}
  `;

  modal.style.display = 'flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
