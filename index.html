<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;color:#e5e7eb;background:#020617}

/* ===== BANNER ===== */
#banner{
  width:100%;
  text-align:center;
  padding:0.7rem;
  font-weight:800;
  letter-spacing:0.5px;
  background: repeating-linear-gradient(
    45deg,
    #FFB700,
    #FFB700 10px,
    #26201F 10px,
    #26201F 20px
  );
  color:white;
  -webkit-text-stroke: 0.6px black;
  text-shadow:
    -1px -1px 0 black,
     1px -1px 0 black,
    -1px  1px 0 black,
     1px  1px 0 black;
}
.banner-on #banner{display:block}

/* NAV */
nav{display:flex;justify-content:space-between;padding:1.5rem 2rem}
.logo{font-weight:700;color:#fff}
ul{display:flex;gap:1.5rem;list-style:none}
a{color:#94a3b8;text-decoration:none}
a:hover{color:#2563eb}

/* HERO */
#hero{text-align:center;padding:5rem 1rem}
#hero h1{font-size:3rem;background:linear-gradient(to right,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#hero p{color:#94a3b8}

/* ABOUT */
.about{
  text-align:center;
  max-width:700px;
  margin:auto;
  padding:2rem;
  color:#cbd5f5;
}

/* GRID */
.container{max-width:1100px;margin:auto;padding:2rem 1rem}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2rem}

/* CARD */
.card{
  background:#0f172a;
  border-radius:16px;
  overflow:hidden;
  border:1px solid #1f2937;
  transition:.3s;
  position:relative;
}
.card:hover{transform:translateY(-6px);border-color:#3b82f6}
.card::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:16px;
  background:linear-gradient(120deg, transparent, rgba(59,130,246,0.15), transparent);
  opacity:0;
  transition:.3s;
}
.card:hover::after{opacity:1;}

.preview img{width:100%;height:250px;object-fit:cover}

.content{padding:1.5rem}
.title{font-weight:600;font-size:1.2rem}
.desc{color:#94a3b8;font-size:.9rem;margin:.5rem 0}
.button{background:#2563eb;padding:.5rem 1rem;border-radius:8px;cursor:pointer}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:none;justify-content:center;align-items:center}
.modal-content{
  background:#020617;
  border-radius:16px;
  max-width:900px;
  width:95%;
  max-height:85vh;
  overflow:auto;
  border:1px solid #1e293b;
}
.details{
  color:#cbd5f5;
  line-height:1.7;
  margin-bottom:1.5rem;
}

/* IMAGES */
.image-gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
  padding:2rem;
}
.image-gallery img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:.25s;
  border:1px solid #1f2937;
}
.image-gallery img:hover{
  transform:scale(1.04);
  border-color:#3b82f6;
}

/* FULLSCREEN IMAGE */
.img-viewer{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;justify-content:center;align-items:center}
.img-viewer img{max-width:90%;max-height:90%}

footer{text-align:center;padding:3rem;color:#64748b}
</style>
