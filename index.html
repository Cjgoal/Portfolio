<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colin Jennings — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      color: #e5e7eb;
      background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
      overflow-x: hidden;
    }

    /* Galaxy effect */
    body::before {
      content: "";
      position: fixed;
      width: 200%; height: 200%;
      background: radial-gradient(white 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.05;
      animation: drift 60s linear infinite;
    }
    @keyframes drift {
      from { transform: translate(0,0); }
      to { transform: translate(-200px, -200px); }
    }

    header {
      padding: 3rem 1rem;
      text-align: center;
    }
    header h1 { font-size: 2.5rem; font-weight: 700; }
    header p { color: #94a3b8; margin-top: 0.5rem; }

    .container { max-width: 1100px; margin: auto; padding: 1rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: rgba(30,41,59,0.6);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    .media { width: 100%; height: 200px; object-fit: cover; }
    video { width: 100%; height: 200px; object-fit: cover; }

    .content { padding: 1rem; }
    .title { font-weight: 600; font-size: 1.2rem; }
    .desc { font-size: 0.9rem; color: #94a3b8; margin-top: 0.3rem; }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .modal-content {
      background: #020617;
      border-radius: 20px;
      max-width: 800px;
      width: 100%;
      padding: 1.5rem;
    }
    .close { float: right; cursor: pointer; font-size: 1.2rem; }

    iframe { width: 100%; height: 300px; border-radius: 10px; }

    footer {
      text-align: center;
      padding: 2rem;
      color: #64748b;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Colin Jennings</h1>
  <p>Mechanical Engineering • Projects • Innovation</p>
</header>

<div class="container">
  <div class="grid">

    <!-- PROJECT 1 -->
    <div class="card" onclick="openModal('bikeLock')">
      <img src="images/bikelock.jpg" class="media">
      <div class="content">
        <div class="title">Smart Bike Lock</div>
        <div class="desc">BLE-controlled automatic locking system</div>
      </div>
    </div>

    <!-- PROJECT 2 (YOUTUBE) -->
    <div class="card" onclick="openModal('robot')">
      <img src="images/robot.jpg" class="media">
      <div class="content">
        <div class="title">Combat Robot</div>
        <div class="desc">60lb competition robot build</div>
      </div>
    </div>

  </div>
</div>

<!-- MODALS -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close" onclick="closeModal()">✕</span>
    <div id="modal-body"></div>
  </div>
</div>

<footer>
  © 2026 Colin Jennings
</footer>

<script>
  function openModal(project) {
    const modal = document.getElementById('modal');
    const body = document.getElementById('modal-body');

    if(project === 'bikeLock') {
      body.innerHTML = `
        <h2>Smart Bike Lock</h2>
        <p>Automatic BLE-based locking system with iOS app and ESP32.</p>
        <video controls>
          <source src="videos/bikelock.mp4" type="video/mp4">
        </video>
      `;
    }

    if(project === 'robot') {
      body.innerHTML = `
        <h2>Combat Robot</h2>
        <p>Designed and built a 60lb combat robot for competition.</p>
        <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
      `;
    }

    modal.style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }
</script>

</body>
</html>
