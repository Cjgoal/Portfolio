<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colin Jennings — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  color:#e5e7eb;
  background:#020617;
  line-height: 1.6;
}

nav{display:flex;justify-content:space-between;padding:1.5rem 2rem}
.logo{font-weight:700; color: #fff}
ul{display:flex;gap:1.5rem;list-style:none}
a{color:#94a3b8;text-decoration:none; transition: 0.2s;}
a:hover{color:#2563eb}

#hero{text-align:center;padding:5rem 1rem}
#hero h1{font-size:3rem; margin-bottom: 0.5rem; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
#hero p{color:#94a3b8; font-size: 1.1rem}

.container{max-width:1100px;margin:auto;padding:2rem 1rem}

.grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr); 
  gap:2rem;
}

.card{
  background:#111827;
  border-radius:16px;
  overflow:hidden;
  transition:.3s;
  border: 1px solid #1f2937;
}
.card:hover{transform:translateY(-8px); border-color: #3b82f6;}

.preview{display:grid;grid-template-columns: 1fr; gap:0px}
.preview img, .preview iframe{width:100%; height:250px; object-fit:cover; border: none;}

.content{padding:1.5rem}
.title{font-weight:600;font-size:1.3rem; color: #f8fafc}
.desc{color:#94a3b8;font-size:.95rem;margin: 0.5rem 0 1rem 0}

.button{
  display:inline-block;
  padding:.6rem 1.2rem;
  border-radius:8px;
  background:#2563eb;
  color: white;
  font-size:.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}
.button:hover{background: #3b82f6;}

/* MODAL REDESIGN */
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(2, 6, 23, 0.95);
  display:none;justify-content:center;align-items:center;
  z-index: 1000;
  backdrop-filter: blur(5px);
}
.modal-content{
  background:#0f172a;
  padding:0;
  border-radius:20px;
  max-width:900px;width:95%;
  max-height: 85vh;
  overflow-y: auto;
  border: 1px solid #1e293b;
  position: relative;
}
.modal-header {
    padding: 2rem;
    border-bottom: 1px solid #1e293b;
}
.modal-body-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2rem;
    padding: 2rem;
}
.modal-info h2 { font-size: 2rem; margin-bottom: 1rem; }
.modal-info p { color: #94a3b8; margin-bottom: 1.5rem; font-size: 1rem; }

.image-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}
.image-gallery img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    border: 1px solid #334155;
}

.close{
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    cursor:pointer;
    font-size: 1.5rem;
    color: #94a3b8;
    z-index: 10;
}

footer{text-align:center;padding:4rem 2rem;color:#64748b; font-size: 0.9rem;}

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
  #hero h1 { font-size: 2.2rem; }
}
</style>
</head>

<body>

<nav>
<div class="logo">Colin Jennings</div>
<ul>
<li><a href="#projects">Projects</a></li>
<li><a href="mailto:your-email@example.com">Contact</a></li>
</ul>
</nav>

<section id="hero">
<h1>Mechanical Engineering & Robotics</h1>
<p>Mechanical Engineering Student at UC Riverside</p>
</section>

<div class="container">
<div id="projects" class="grid"></div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-content" onclick="event.stopPropagation()">
<span class="close" onclick="closeModal()">✕</span>
<div id="modal-body"></div>
</div>
</div>

<footer>© 2026 Colin Jennings • Pleasanton, CA</footer>

<script>
const projects = [
{
  title: "Highlander Racing - FSAE",
  description: "Drivetrain Engineering Associate at UC Riverside's Highlander Racing Team",
  thumbnail: "assets/highlander racing.jpg",
  // Extracted the clean embed URL from your iframe
  slides: "https://o365ucr-my.sharepoint.com/personal/cjenn003_ucr_edu/_layouts/15/Doc.aspx?sourcedoc={a3e27af7-c4d3-4b75-afbc-c6735f95781e}&action=embedview&wdAr=1.7777777777777777", 
  images: ["assets/robot-cad.jpg", 
          "assets/FSAE ScatterShield Drawing.png"],
  details: "As a Drivetrain Associate for Highlander Racing, I have designed a full Differntial assembly and Scatter Shield. To design the Differential plates, I used Solidworks FEA to limit maximum deflection while keeping weight low. I have also completed engineering drawings as part of our grading criteria for competition."
},
{
  title: "Pleasanton Pixels",
  description: "Computer controlled holiday light shows.",
  video: "https://www.youtube.com/embed/tC4W2WbGR0o",
  thumbnail: "assets/Pleasanton Pixels 1.JPG",
  images: [
    "assets/Halloween Outdoor Setup.JPG",
    "assets/Controller Box.JPG",
    "assets/Light Wall & Tune to sign.JPG",
    "assets/Hosue layout.png",
    "assets/Drilling PVC.JPG",
    "assets/InstalllingLadder.HEIC",
    "assets/sequnce.png",
    "assets/Pleasanton Pixels 2.JPG",
    "assets/Pleasanton Pixels 3.JPG",
    "assets/Pleasanton Pixels 4.JPG"
  ],
  details: "A large-scale hobbyist engineering project involving raspberry pi's, custom power distribution, mechanical display design, manufacturing and xLights sequencing. This project showcases my ability to manage complex outdoor electrical setups, ability to learn high tech computer control and hands on electrical wiring."
},
{
  title: "Combat Robotics (RoboGames)",
  description: "60lb heavyweight robot designed for high-impact durability on a budget.",
  video: "https://www.youtube.com/embed/-laG-haSI4I",
  thumbnail: "assets/IMG_6491.jpeg",
  images: [
    "assets/IMG_3930.jpeg",
    "assets/IMG_4090.jpeg",
    "assets/IMG_4160.jpeg",
    "assets/IMG_4198.jpeg",
    "assets/IMG_4200.jpeg",
    "assets/IMG_4201.jpeg",
    "assets/IMG_4219.jpeg",
    "assets/IMG_4391.jpeg",
    "assets/IMG_4397.jpeg",
    "assets/IMG_9849.jpeg"
  ],
  details: "Engineered and built a combat robot with a 6061 aluminum frame and a high kinetic energy steel weapon, designed for 250 mph tip speed. Competed at the International RoboGames 2024 in San Jose, placing 5th against established engineers and university teams."
},
{
  title: "Manufacturing & Fabrication",
  description: "Hands-on classes for Welding, Automotive technology, and Robotics.",
  thumbnail: "assets/Welding Class.jpeg",
  images: [
    "assets/Welding Class.jpeg",
    "assets/Automotive Class.jpeg"
  ],
  details: "Formal introduction and training in multiples types of welding, metal manufacturing, 3d printing, laser cutting, etc."
},
{
  title: "Ride Shield (Capstone)",
  description: "Automated, BLE-activated bike security system.",
  video: "https://www.youtube.com/embed/GA05c-eLNOg",
  thumbnail:  "assets/IMG_5276.jpeg",
  images: [
    "assets/IMG_5276.jpeg"
  ],
  details: "A fully integrated project featuring a mechancial braking system prototype, and a custom mobile iphone app communication to an ESP32 over bluetooth."
}
];

const container = document.getElementById('projects');

projects.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="preview">
      <img src="${p.thumbnail}" alt="${p.title}">
    </div>
    <div class="content">
      <div class="title">${p.title}</div>
      <div class="desc">${p.description}</div>
      <div class="button" onclick="openModal(${i})">About →</div>
    </div>
  `;
  container.appendChild(card);
});

function openModal(i){
  const p = projects[i];
  const modal = document.getElementById('modal');
  const body = document.getElementById('modal-body');

  body.innerHTML = `
    <div class="modal-header">
        <h2>${p.title}</h2>
        <p style="color: #3b82f6; font-weight: 600;">Project Overview</p>
    </div>
    <div class="modal-body-grid">
        <div class="modal-info">
            <p>${p.details}</p>
            ${p.slides ? `
              <div style="margin-bottom: 2rem;">
                <iframe src="${p.slides}" width="100%" height="450px" frameborder="0" scrolling="no" allowfullscreen="true" style="border-radius:12px; border:1px solid #1e293b;"></iframe>
              </div>
            ` : ''}
            ${p.video ? `<iframe src="${p.video}" allowfullscreen style="width:100%; height:450px; border-radius:12px; border:none; margin-bottom: 2rem;"></iframe>` : ''}
        </div>
        <div class="image-gallery">
            ${p.images.map(img => `<img src="${img}" alt="Project detail">`).join('')}
        </div>
    </div>
  `;

  modal.style.display = 'flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
